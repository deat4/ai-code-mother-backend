spring:
  application:
    name: ai-code-mother-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai-code-mother
    username: root
    password: "root"
  profiles:
    active: location

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.zkf.aicodemother.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# app config
app:
  deploy:
    # 已部署应用访问域名
    host: http://localhost:8123/api/static
  preview:
    # 预览应用访问域名
    host: http://localhost:8123/api/preview